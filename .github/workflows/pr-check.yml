name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Verify lockfile consistency
        run: uv sync --frozen
      - name: Lint (fatal errors only)
        run: uv run ruff check --select E9,F7,F82,F811 .
      - name: Run tests
        run: uv run pytest tests/ -q -m "not network"

services:
  invest-brief:
    image: ghcr.io/dragonl641/invest-brief:latest
    container_name: invest-brief
    volumes:
      - ./config.json:/app/config.json:ro
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
      - ./reports:/app/reports
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

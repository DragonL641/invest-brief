[project]
name = "invest-brief"
version = "0.1.0"
description = "Personalized investment briefing via email"
requires-python = ">=3.10"
dependencies = [
    "yfinance",
    "requests",
    "anthropic",
    "python-dotenv",
    "croniter",
    "akshare",
]

[project.scripts]
invest-brief = "run:main"

[dependency-groups]
dev = [
    "pytest>=9.1.1",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

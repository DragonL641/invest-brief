[project]
name = "invest-brief"
version = "0.1.0"
description = "Personalized investment briefing via email"
requires-python = ">=3.10"
dependencies = [
    "yfinance",
    "requests",
    "anthropic",
    "python-dotenv",
    "matplotlib",
    "croniter",
    "pydantic",
    "akshare",
    "finvizfinance>=1.3.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "redis>=5.0.0",
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "sse-starlette>=2.0.0",
]

[project.scripts]
invest-brief = "run:main"

[project]
name = "invest-brief"
version = "0.1.0"
description = "Personalized investment briefing via email"
requires-python = ">=3.10"
dependencies = [
    "yfinance",
    "requests",
    "anthropic",
    "python-dotenv",
    "matplotlib",
    "croniter",
    "pydantic",
    "akshare",
]

[project.scripts]
invest-brief = "run:main"

[dependency-groups]
dev = [
    "playwright>=1.59.0",
]
